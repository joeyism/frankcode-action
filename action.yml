name: 'FrankCode Action'
description: 'Run FrankCode autonomously on your issues to generate PRs'
author: 'joeyism'

branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  api-key:
    description: 'API key for the LLM (e.g., GEMINI_API_KEY, OPENAI_API_KEY)'
    required: true
  api-key-name:
    description: 'Name of the environment variable for the API key (e.g., GEMINI_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY)'
    required: false
    default: 'GEMINI_API_KEY'
  github-token:
    description: 'GitHub Token for creating the PR'
    required: true
  model:
    description: 'LLM model to use'
    required: false
    default: 'google/gemini-3.1-pro-preview'

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        npm install -g opencode-ai
        pip install frankcode

    - name: Prepare Prompt
      shell: bash
      id: prompt
      run: |
        cat << 'EOF' > frankcode_prompt.txt
        Please resolve the following issue.
        
        Title: ${{ github.event.issue.title }}
        
        Issue Description:
        ${{ github.event.issue.body }}
        
        Instruction from comment:
        ${{ github.event.comment.body }}
        EOF

    - name: Run FrankCode
      shell: bash
      run: |
        export ${{ inputs.api-key-name }}=${{ inputs.api-key }}
        frankcode exec "$(cat frankcode_prompt.txt)" --model "${{ inputs.model }}"

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.github-token }}
        commit-message: "FrankCode: Implement fix for issue #${{ github.event.issue.number }}"
        title: "FrankCode: Fix issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
        body: |
          This PR was generated by FrankCode in response to [Issue #${{ github.event.issue.number }}](${{ github.event.issue.html_url }}).
          
          Triggered by comment:
          > ${{ github.event.comment.body }}
        branch: "frankcode/issue-${{ github.event.issue.number }}"
        labels: "frankcode, automated pr"
